<html lang="pl">
<head>

    <title>devmentor.pl - PHP: JavaScript, The DOM - #05</title>

<body>

     <form action="" method="post" novalidate>
        <div>
            <label for="formLogin">
                email:
            </label>
            <input id="formLogin" name="login" type="email" required/> 
        </div>
        <div>
            <label for="formPass1">
                password1:
            </label>
            <input id="formPass1" name="pass1" type="password" required/>
        </div>
        <div>
            <label for="formPass2">
                password2:
            </label>
            <input id="formPass2" name="pass2" type="password" required/>
        </div>
        <div>
            <label for="formAccept">
                I accept regulations:
            </label>
            <input id="formAccept" name="accept" type="checkbox" required/> 
        </div>
        <div>
            <input type="submit" value="register" />
        </div>
        <div class="messages"></div>
    </form>


    <script src="./app.js"></script>
</body>
</html>
